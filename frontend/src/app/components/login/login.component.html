<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow">
        <div class="card-body p-4">
          <h3 class="card-title text-center mb-4">
            🎓 Portail Doctorat
          </h3>
          <h5 class="text-center text-muted mb-4">Connexion</h5>

          @if (erreur) {
            <div class="alert alert-danger">{{ erreur }}</div>
          }

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              [(ngModel)]="email"
              placeholder="votre@email.com"
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Mot de passe</label>
            <input
              type="password"
              class="form-control"
              [(ngModel)]="motDePasse"
              placeholder="••••••••"
            />
          </div>

          <button class="btn btn-primary w-100 mt-2" (click)="login()">
            Se connecter
          </button>

          <div class="mt-3 text-muted small text-center">
  <p>Test : <strong>admin&#64;test.com</strong> → Admin</p>
  <p>Test : <strong>directeur&#64;test.com</strong> → Directeur</p>
  <p>Test : <strong>sara&#64;test.com</strong> → Doctorant</p>
</div>
        </div>
      </div>
    </div>
  </div>
</div>
